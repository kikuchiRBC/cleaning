.animated-wave{  
    position:absolute;
    bottom:-50px;
    left:0;

    width:200%;
    height:180%;

    display:block;

    will-change: transform;
    transform: translate3d(0,0,0);

    animation:wave-animation 10s linear infinite;
}





/* 波線の色 */
.animated-wave path {
  fill: #00bcd4;
}




@keyframes wave-animation{
    from{
        transform: translateX(0);
    }

    to{
        transform: translateX(-50%);
    }
}




.animated-wave-section .content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding-top: 100px;
  color: #333;
}
      button {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 60%;
  height: 100%;
  background: rgba(255, 255, 255, 0.3);
  transform: skewX(-25deg);
  transition: 0.6s;
}

button:hover::before {
  left: 140%;
}


button:hover{
    box-shadow:0 8px 20px rgba(0,0,0,.3);
}

  #orcaImage {
  animation: swim 8s ease-in-out infinite;
}

@keyframes swim {
  0% {
    transform: translate(0px, 0px) rotate(-3deg);
  }

  25% {
    transform: translate(15px, -8px) rotate(0deg);
  }

  50% {
    transform: translate(0px, -15px) rotate(3deg);
  }

  75% {
    transform: translate(-15px, -8px) rotate(0deg);
  }

  100% {
    transform: translate(0px, 0px) rotate(-3deg);
  }
}

.bubble-background{
  position:fixed;

  left:0;

/* 泡の見た目 */

.bubble{
  position:absolute;
  bottom:-50px;

  border:2px solid rgba(255,255,255,.7);
  background:rgba(255,255,255,.15);

  border-radius:50%;
z-index:5;
  animation:bubble 12s linear infinite;
}


/* 泡の一番明るい部分を疑似要素で表現 */
.bubble::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  transform: scale(0.25) translate(-70%, -70%);
  background: radial-gradient(rgba(255,255,255, 0.5), transparent);
  border-radius: 50%;
}

/* 泡が上に浮かび上がっていくアニメーション */
@keyframes bubble {
  0% {
   transform: translateY(0);
    opacity: 1;
  }
  99% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh);
    opacity: 0;
  }
}

    return array.sort(() => Math.random() - 0.5);

function loadQuiz(){

    document.getElementById("result").textContent="";
    document.getElementById("next").style.display="none";

const q = quizData[current];

if(q.image){

    document.getElementById("toolImage").style.display = "block";
    document.getElementById("questionText").style.display = "none";

    document.getElementById("toolImage").src = q.image;

}else{

    document.getElementById("toolImage").style.display = "none";
    document.getElementById("questionText").style.display = "block";

    document.getElementById("questionText").innerHTML =
        q.question;
}


    document.getElementById("count").textContent =
        (current + 1) + " / " + quizData.length;

    const area =
        document.getElementById("choices");

    area.innerHTML="";

   

const choices = q.choices
    ? q.choices
    : makeChoices(q);



    choices.forEach(choice=>{

        const btn =
            document.createElement("button");

        btn.innerHTML = choice;

        btn.onclick = function(){

            if(choice === q.answer){

                score++;

                document.getElementById("result")
                    .textContent = "〇 正解！";

            }else{

                miss++;

                document.getElementById("result")
                    .innerHTML =
                    "× 不正解！ 正解は「" +
                    q.answer + "」";
            }

            document.getElementById("score")
                .textContent = score;

            document.getElementById("miss")
                .textContent = miss;

            document
            .querySelectorAll("#choices button")
            .forEach(b => b.disabled = true);

            document.getElementById("next")
                .style.display="inline-block";
        };

        area.appendChild(btn);
    });
}
